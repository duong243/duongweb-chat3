        .contact-list { flex: 1; overflow-y: auto; padding: 8px; -webkit-overflow-scrolling: touch; }
        .section-title { font-size: 12px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; padding: 10px 12px 6px; display: flex; justify-content: space-between; }
        .contact-item { display: flex; align-items: center; gap: 10px; padding: 12px 12px; border-radius: 14px; cursor: pointer; transition: all 0.15s; margin-bottom: 2px; position: relative; }

        .btn-follow-action { background: var(--follow-color); color: #fff; }

        .btn-like-action { background: var(--like-color); color: #fff; }

    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let currentUser = null, currentContact = null, sidebarTab = 'chats';
    let allUsers = {}, allMessages = {}, allContacts = {}, allFollows = {}, allLikes = {}, allBanned = {};
    let friendRequests = {}, lastReadTime = {};

    // ============ DATA ============
    async function loadData() {
        const snap = await get(ref(db, '/'));
        if (snap.exists()) {
            const d = snap.val();
            allUsers = d.users || {}; allMessages = d.messages || {}; allContacts = d.contacts || {};
            allFollows = d.follows || {}; allLikes = d.likes || {}; allBanned = d.banned || {};
            friendRequests = d.friendRequests || {};
        }
    }

    async function saveData() {
        await set(ref(db, '/'), {
            users: allUsers, messages: allMessages, contacts: allContacts,
            follows: allFollows, likes: allLikes, banned: allBanned, friendRequests
        });
    }

    function st(msg, tp) {
        const t = document.createElement('div');
        t.className = 'toast toast-' + (tp || 'info');
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2500);
    }

    function gc(s) {
        const colors = ['#0084ff','#ff6b6b','#4ecdc4','#ffd93d','#6c5ce7','#a29bfe','#fd79a8','#00b894'];
        let h = 0;
        for (let i = 0; i < s.length; i++) h = s.charCodeAt(i) + ((h << 5) - h);
        return colors[Math.abs(h) % colors.length];
    }

    function ft(ts) {
        const d = new Date(ts);
        return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    }

    function ck(a, b) { return [a, b].sort().join('|'); }
    function fui(uid) { for (let k in allUsers) if (allUsers[k].id === uid) return allUsers[k]; return null; }

    function findUser(query) {
        query = query.trim();
        if (query.startsWith('@')) { for (let k in allUsers) if (allUsers[k].id === query) return allUsers[k]; }
        for (let k in allUsers) if (allUsers[k].id === '@' + query || allUsers[k].un === query) return allUsers[k];
        return null;
    }

    function getUnreadCount(uid1, uid2) {
        const key = ck(uid1, uid2);
        const msgs = allMessages[key] || [];
        const lastRead = lastReadTime[key] || 0;
        return msgs.filter(m => m.sid !== uid1 && m.time > lastRead).length;
    }

    function getStrangersWithMessages() {
        const strangers = [];
        const contacts = allContacts[currentUser.id] || [];
        for (let key in allMessages) {
            const ids = key.split('|');
            if (ids.includes(currentUser.id)) {
                const otherId = ids[0] === currentUser.id ? ids[1] : ids[0];
                if (!contacts.includes(otherId) && allMessages[key].length > 0) {
                    if (!strangers.includes(otherId)) strangers.push(otherId);
                }
            }
        }
        return strangers;
    }

    function updateBadges() {
        const contacts = allContacts[currentUser.id] || [];
        let totalUnread = 0;
        contacts.forEach(cid => { totalUnread += getUnreadCount(currentUser.id, cid); });
        const strangers = getStrangersWithMessages();
        strangers.forEach(cid => { if (!contacts.includes(cid)) totalUnread += getUnreadCount(currentUser.id, cid); });

        document.getElementById('chatBadge').textContent = totalUnread;
        document.getElementById('chatBadge').style.display = totalUnread > 0 ? 'inline' : 'none';
        document.getElementById('strangerBadge').textContent = strangers.length;
        document.getElementById('strangerBadge').style.display = strangers.length > 0 ? 'inline' : 'none';
        const reqs = friendRequests[currentUser.id] || [];
        document.getElementById('requestBadge').textContent = reqs.length;
        document.getElementById('requestBadge').style.display = reqs.length > 0 ? 'inline' : 'none';
    }

    // ============ AUTH ============
    const savedUser = localStorage.getItem('chatapp_remember_user');
    if (savedUser) { document.getElementById('loginUsername').value = savedUser;
        document.getElementById('rememberMe').checked = true; }

    document.getElementById('tabLogin').addEventListener('click', () => {
        document.getElementById('tabLogin').classList.add('active');
        document.getElementById('tabRegister').classList.remove('active');
        document.getElementById('loginForm').style.display = 'flex';
        document.getElementById('registerForm').style.display = 'none';
    });
    document.getElementById('tabRegister').addEventListener('click', () => {
        document.getElementById('tabRegister').classList.add('active');
        document.getElementById('tabLogin').classList.remove('active');
        document.getElementById('registerForm').style.display = 'flex';
        document.getElementById('loginForm').style.display = 'none';
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        await loadData();
        const un = document.getElementById('loginUsername').value.trim();
        const pw = document.getElementById('loginPassword').value.trim();
        const remember = document.getElementById('rememberMe').checked;
        if (!un || !pw) return st('Nh?p d?y d?!', 'error');
        const user = allUsers[un];
        if (!user) return st('Tŕi kho?n không t?n t?i!', 'error');
        if (user.pw !== pw) return st('Sai m?t kh?u!', 'error');
        if (allBanned[user.id]) return st('Tŕi kho?n b? khóa!', 'error');
        currentUser = user;
        allContacts[user.id] = allContacts[user.id] || [];
        allFollows[user.id] = allFollows[user.id] || [];
        friendRequests[user.id] = friendRequests[user.id] || [];
        if (remember) localStorage.setItem('chatapp_remember_user', un);
        else localStorage.removeItem('chatapp_remember_user');
        showApp();
        st('Chŕo ' + user.dn + '!', 'success');
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        await loadData();
        const dn = document.getElementById('regDisplayName').value.trim();
        const un = document.getElementById('regUsername').value.trim();
        const pw = document.getElementById('regPassword').value;
        if (!dn || !un || !pw) return st('Nh?p d?y d?!', 'error');
        if (pw.length < 4) return st('M?t kh?u >= 4 ký t?!', 'error');
        if (allUsers[un]) return st('Tęn dă t?n t?i!', 'error');
        const uid = '@' + un;
        allUsers[un] = { id: uid, un, dn, pw, av: dn.charAt(0).toUpperCase(), isAd: false, bio: '', ct: Date.now() };
        allContacts[uid] = []; allFollows[uid] = []; allLikes[uid] = [];
        friendRequests[uid] = [];
        await saveData();
        currentUser = allUsers[un];
        showApp();
        st('Đang ký thŕnh công! ID: ' + uid, 'success');
    });

    function showApp() {
        document.getElementById('authContainer').classList.add('hidden');
        document.getElementById('appContainer').classList.remove('hidden');
        document.getElementById('myName').textContent = currentUser.dn;
        if (currentUser.isAd) {
            document.getElementById('myName').innerHTML += '<span class="admin-tag">ADMIN</span>';
        }
        document.getElementById('myAvatar').textContent = currentUser.av;
        document.getElementById('myAvatar').style.background = currentUser.isAd ? '#f44' : gc(currentUser.id);
        document.getElementById('myIdDisplay').textContent = currentUser.id;
        document.getElementById('myIdSmall').textContent = currentUser.id;
        sidebarTab = 'chats';
        document.querySelectorAll('.sidebar-nav-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('[data-tab="chats"]').classList.add('active');
        if (window.innerWidth <= 768) showSidebar();
        renderContacts();
        updateBadges();
        startRealtimeListener();
    }

    function startRealtimeListener() {
        onValue(ref(db, '/'), (snap) => {
            if (snap.exists()) {
                const d = snap.val();
                allUsers = d.users || {}; allMessages = d.messages || {}; allContacts = d.contacts || {};
                allFollows = d.follows || {}; allLikes = d.likes || {}; allBanned = d.banned || {};
                friendRequests = d.friendRequests || {};
                if (currentUser) {
                    renderContacts();
                    if (currentContact) { renderMessages();
                        updateHeaderButtons(); }
                    updateBadges();
                }
            }
        });
    }

    // ============ MOBILE ============
    function showSidebar() { document.getElementById('sidebar').classList.remove('hidden-mobile'); }

    function hideSidebar() {
        if (window.innerWidth <= 768) document.getElementById('sidebar').classList.add('hidden-mobile');
    }

    document.getElementById('btnBackMobile').addEventListener('click', showSidebar);

    // ============ RENDER ============
    function renderContacts() {
        const lst = document.getElementById('contactList');
        let html = '';
        const contacts = allContacts[currentUser.id] || [];
        const strangers = getStrangersWithMessages().filter(s => !contacts.includes(s));

        if (sidebarTab === 'chats') {
            html = `<div class="section-title">B?n bč (${contacts.length})</div>`;
            contacts.forEach(cid => { const u = fui(cid); if (u) html += buildItem(u, cid, false); });
        } else if (sidebarTab === 'strangers') {
            html = `<div class="section-title">Ngu?i l? (${strangers.length})</div>`;
            strangers.forEach(cid => { const u = fui(cid); if (u) html += buildItem(u, cid, true); });
        } else if (sidebarTab === 'requests') {
            const reqs = friendRequests[currentUser.id] || [];
            html = `<div class="section-title">L?i m?i (${reqs.length})</div>`;
            reqs.forEach(cid => { const u = fui(cid); if (u) html += buildRequestItem(u, cid); });
        } else if (sidebarTab === 'following') {
            const following = allFollows[currentUser.id] || [];
            html = `<div class="section-title">Theo dői (${following.length})</div>`;
            following.forEach(cid => { const u = fui(cid); if (u) html += buildItem(u, cid, false); });
        }
        lst.innerHTML = html;

        lst.querySelectorAll('.contact-item').forEach(it => {
            it.addEventListener('click', function(e) {
                if (e.target.closest('button') && !e.target.closest('.contact-item')) return;
                const cid = this.dataset.c;
                if (sidebarTab === 'requests') { acceptFriendRequest(cid); } else { selectContact(cid);
                    hideSidebar(); }
            });
        });
        lst.querySelectorAll('.contact-delete-btn').forEach(b => {
            b.addEventListener('click', async function(e) {
                e.stopPropagation();
                const cid = this.dataset.dc;
                allContacts[currentUser.id] = (allContacts[currentUser.id]||[]).filter(c => c !== cid);
                if (allContacts[cid]) allContacts[cid] = allContacts[cid].filter(c => c !== currentUser.id);
                await saveData();
                if (currentContact === cid) { currentContact = null;
                    resetChat(); }
                renderContacts();
            });
        });
        lst.querySelectorAll('.btn-accept-friend, .btn-reject-friend').forEach(b => {
            b.addEventListener('click', async function(e) {
                e.stopPropagation();
                const cid = this.dataset.c;
                if (this.classList.contains('btn-accept-friend')) acceptFriendRequest(cid);
                else rejectFriendRequest(cid);
            });
        });
    }

    function buildItem(u, cid, isStranger) {
        const key = ck(currentUser.id, cid);
        const msgs = allMessages[key] || [];
        const last = msgs.length > 0 ? msgs[msgs.length-1] : null;
        const unread = getUnreadCount(currentUser.id, cid);
        return `<div class="contact-item${currentContact===cid?' active':''}${unread>0?' unread':''}${isStranger?' stranger':''}" data-c="${cid}">
            <div class="contact-avatar" style="background:${u.isAd?'#f44':gc(u.id)}">${u.av}</div>
            <div class="contact-info"><div class="contact-name">${u.dn}${u.isAd?' <span class="admin-tag">ADMIN</span>':''}${isStranger?' <span style="color:#ff9800;font-size:9px;">L?</span>':''}</div>
            <div class="contact-last-msg">${last?last.text.substring(0,30):'Chua có tin nh?n'}</div></div>
            <div class="contact-meta"><div class="contact-time">${last?ft(last.time):''}</div>${unread>0?`<div class="unread-count">${unread}</div>`:''}</div>
            ${!isStranger?`<button class="contact-delete-btn" data-dc="${cid}">?</button>`:''}</div>`;
    }

    function buildRequestItem(u, cid) {
        return `<div class="contact-item" data-c="${cid}">
            <div class="contact-avatar" style="background:${gc(u.id)}">${u.av}</div>
            <div class="contact-info"><div class="contact-name">${u.dn}</div><div class="contact-last-msg">Mu?n k?t b?n</div></div>
            <div style="display:flex;gap:4px;"><button class="btn-sm btn-accept-friend" data-c="${cid}" style="background:#4caf50;color:#fff;">Đ?ng ý</button><button class="btn-sm btn-reject-friend" data-c="${cid}" style="background:#ff4444;color:#fff;">T? ch?i</button></div></div>`;
    }

    function selectContact(cid) {
        currentContact = cid;
        const ct = fui(cid);
        if (!ct) return;
        const key = ck(currentUser.id, cid);
        lastReadTime[key] = Date.now();
        document.getElementById('chatContactName').textContent = ct.dn;
        if (ct.isAd) document.getElementById('chatContactName').innerHTML += ' <span class="admin-tag">ADMIN</span>';
        document.getElementById('chatContactId').textContent = 'ID: ' + ct.id;
        document.getElementById('chatAvatar').textContent = ct.av;
        document.getElementById('chatAvatar').style.background = ct.isAd ? '#f44' : gc(ct.id);
        document.getElementById('messageInput').disabled = false;
        document.getElementById('messageInput').focus();
        document.getElementById('btnClear').style.display = 'inline-block';
        document.getElementById('btnDelete').style.display = 'inline-block';
        updateHeaderButtons();
        renderMessages();
        renderContacts();
        updateBadges();
    }

    function resetChat() {
        document.getElementById('chatContactName').textContent = 'Ch?n ngu?i';
        document.getElementById('chatContactId').textContent = '';
        document.getElementById('chatAvatar').textContent = '#';
        document.getElementById('messageInput').disabled = true;
        document.getElementById('messagesContainer').innerHTML = '<div class="empty-chat"><div class="empty-icon">??</div><div class="empty-text">Ch?n ngu?i d? chat</div></div>';
        ['btnClear','btnDelete','btnFollow','btnLike'].forEach(id => document.getElementById(id).style.display='none');
        document.getElementById('adminBtns').innerHTML = '';
        document.getElementById('friendRequestBar').style.display = 'none';
    }

    function updateHeaderButtons() {
        if (!currentContact) return;
        const fb = document.getElementById('btnFollow');
        fb.style.display = 'inline-block';
        const isFollowing = (allFollows[currentUser.id]||[]).includes(currentContact);
        fb.textContent = isFollowing ? 'B? theo dői' : 'Theo dői';
        fb.className = 'btn-sm ' + (isFollowing ? 'btn-unfollow' : 'btn-follow');

        const lb = document.getElementById('btnLike');
        lb.style.display = 'inline-block';
        const isLiked = (allLikes[currentContact]||[]).includes(currentUser.id);
        lb.textContent = isLiked ? 'B? thích' : 'Thích';
        lb.className = 'btn-sm ' + (isLiked ? 'btn-unlike' : 'btn-like');

        const bar = document.getElementById('friendRequestBar');
        const reqs = friendRequests[currentUser.id] || [];
        if (currentContact && reqs.includes(currentContact)) {
            bar.style.display = 'block';
            document.getElementById('friendRequestText').textContent = (fui(currentContact)?.dn||'Ai dó') + ' mu?n k?t b?n!';
        } else { bar.style.display = 'none'; }
    }

    function renderMessages() {
        const container = document.getElementById('messagesContainer');
        if (!currentContact) { container.innerHTML = '<div class="empty-chat">Ch?n ngu?i</div>'; return; }
        const key = ck(currentUser.id, currentContact);
        const msgs = allMessages[key] || [];
        let html = '';
        if (msgs.length === 0) {
            html = '<div class="empty-chat"><div class="empty-icon">??</div><div class="empty-text">Chat v?i ' + (fui(currentContact)?.dn||'...') + '</div></div>';
        } else {
            let lastDate = '';
            msgs.forEach(m => {
                const md = new Date(m.time).toLocaleDateString('vi-VN');
                if (md !== lastDate) {
                    lastDate = md;
                    const today = new Date().toLocaleDateString('vi-VN');
                    const yesterday = new Date(Date.now()-86400000).toLocaleDateString('vi-VN');
                    html += '<div class="date-separator"><span>' + (md===today?'Hôm nay':md===yesterday?'Hôm qua':md) + '</span></div>';
                }
                const sent = m.sid === currentUser.id;
                const s = sent ? currentUser : fui(m.sid);
                const ac = s ? (s.isAd?'#f44':gc(m.sid)) : '#999';
                html += `<div class="message-wrapper ${sent?'sent':'received'}">
                    <button class="msg-delete-btn" data-dm="${m.id}">?</button>
                    <div class="msg-avatar" style="background:${ac}">${s?s.av:'?'}</div>
                    <div>${!sent&&s?`<div style="font-size:10px;color:#666;">${s.dn}</div>`:''}
                    <div class="message-bubble">${m.text.replace(/\n/g,'<br>')}</div>
                    <div class="message-time">${ft(m.time)}</div></div></div>`;
            });
        }
        container.innerHTML = html;
        container.querySelectorAll('.msg-delete-btn').forEach(b => {
            b.addEventListener('click', async function(e) {
                e.stopPropagation();
                const key = ck(currentUser.id, currentContact);
                allMessages[key] = (allMessages[key]||[]).filter(m => m.id !== this.dataset.dm);
                await saveData();
                renderMessages();
            });
        });
        container.scrollTop = container.scrollHeight;
    }

    // ============ ACTIONS ============
    async function sendFriendRequest(targetId) {
        friendRequests[targetId] = friendRequests[targetId] || [];
        if (friendRequests[targetId].includes(currentUser.id)) return st('Đă g?i!', 'info');
        friendRequests[targetId].push(currentUser.id);
        await saveData();
        st('Đă g?i l?i m?i!', 'success');
    }

    async function acceptFriendRequest(fromId) {
        friendRequests[currentUser.id] = (friendRequests[currentUser.id]||[]).filter(id => id !== fromId);
        allContacts[currentUser.id] = allContacts[currentUser.id] || [];
        if (!allContacts[currentUser.id].includes(fromId)) allContacts[currentUser.id].push(fromId);
        allContacts[fromId] = allContacts[fromId] || [];
        if (!allContacts[fromId].includes(currentUser.id)) allContacts[fromId].push(currentUser.id);
        await saveData();
        renderContacts();
        updateBadges();
        st('Đă ch?p nh?n!', 'success');
    }

    async function rejectFriendRequest(fromId) {
        friendRequests[currentUser.id] = (friendRequests[currentUser.id]||[]).filter(id => id !== fromId);
        await saveData();
        renderContacts();
        updateBadges();
        st('Đă t? ch?i!', 'info');
    }

    document.getElementById('btnSend').addEventListener('click', async () => {
        if (!currentUser || !currentContact) return;
        const text = document.getElementById('messageInput').value.trim();
        if (!text) return;
        const key = ck(currentUser.id, currentContact);
        allMessages[key] = allMessages[key] || [];
        allMessages[key].push({ id: Date.now().toString(), sid: currentUser.id, sn: currentUser.dn, text, time: Date.now() });
        await saveData();
        document.getElementById('messageInput').value = '';
        renderMessages();
        renderContacts();
        updateBadges();
    });

    document.getElementById('messageInput').addEventListener('keypress', function(e) { if (e.key === 'Enter') document.getElementById('btnSend').click(); });
    document.getElementById('btnAddContact').addEventListener('click', async () => {
        const q = document.getElementById('addContactInput').value.trim();
        if (!q) return;
        const u = findUser(q);
        if (!u) return st('Không těm th?y!', 'error');
        if (u.id === currentUser.id) return st('Không th? t? k?t b?n!', 'error');
        if ((allContacts[currentUser.id]||[]).includes(u.id)) return st('Đă lŕ b?n!', 'info');
        await sendFriendRequest(u.id);
        document.getElementById('addContactInput').value = '';
    });
    document.getElementById('btnClear').addEventListener('click', async () => {
        allMessages[ck(currentUser.id, currentContact)] = [];
        await saveData();
        renderMessages();
    });
    document.getElementById('btnDelete').addEventListener('click', async () => {
        allContacts[currentUser.id] = (allContacts[currentUser.id]||[]).filter(c => c !== currentContact);
        if (allContacts[currentContact]) allContacts[currentContact] = allContacts[currentContact].filter(c => c !== currentUser.id);
        await saveData();
        currentContact = null;
        resetChat();
        renderContacts();
        showSidebar();
    });
    document.getElementById('btnFollow').addEventListener('click', async () => {
        allFollows[currentUser.id] = allFollows[currentUser.id] || [];
        const idx = allFollows[currentUser.id].indexOf(currentContact);
        if (idx >= 0) allFollows[currentUser.id].splice(idx, 1);
        else allFollows[currentUser.id].push(currentContact);
        await saveData();
        updateHeaderButtons();
    });
    document.getElementById('btnLike').addEventListener('click', async () => {
        allLikes[currentContact] = allLikes[currentContact] || [];
        const idx = allLikes[currentContact].indexOf(currentUser.id);
        if (idx >= 0) allLikes[currentContact].splice(idx, 1);
        else allLikes[currentContact].push(currentUser.id);
        await saveData();
        updateHeaderButtons();
    });
    document.getElementById('btnAcceptRequest').addEventListener('click', async function() {
        if (currentContact) { await acceptFriendRequest(currentContact);
            selectContact(currentContact); }
    });
    document.getElementById('btnRejectRequest').addEventListener('click', async function() {
        if (currentContact) { await rejectFriendRequest(currentContact);
            document.getElementById('friendRequestBar').style.display = 'none'; }
    });
    document.getElementById('btnLogout').addEventListener('click', () => {
        currentUser = null; currentContact = null;
        document.getElementById('appContainer').classList.add('hidden');
        document.getElementById('authContainer').classList.remove('hidden');
    });
    document.querySelectorAll('.sidebar-nav-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.sidebar-nav-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            sidebarTab = this.dataset.tab;
            renderContacts();
        });
    });
    document.getElementById('myProfileBtn').addEventListener('click', () => { if (currentUser) showProfile(currentUser.id); });
    document.getElementById('chatContactName').addEventListener('click', () => { if (currentContact) showProfile(currentContact); });

    function showProfile(uid) {
        const u = fui(uid);
        if (!u) return;
        const me = currentUser && currentUser.id === uid;
        const fw = currentUser ? (allFollows[currentUser.id]||[]).includes(uid) : false;
        const lk = currentUser ? (allLikes[uid]||[]).includes(currentUser.id) : false;
        const followers = Object.values(allFollows).filter(f => f.includes(uid)).length;
        const following = (allFollows[uid]||[]).length;
        const likes = (allLikes[uid]||[]).length;
        let h = `<div class="profile-avatar" style="background:${u.isAd?'#f44':gc(u.id)}">${u.av}</div>`;
        h += `<div class="profile-name">${u.dn}${u.isAd?' <span class="admin-tag">ADMIN</span>':''}</div>`;
        h += `<div class="profile-username">${u.id}</div>`;
        h += `<div class="profile-bio">${u.bio||'Chua có gi?i thi?u'}</div>`;
        h += `<div class="profile-stats"><div class="profile-stat"><div class="stat-num">${followers}</div><div class="stat-label">Theo dői</div></div><div class="profile-stat"><div class="stat-num">${following}</div><div class="stat-label">Đang theo dői</div></div><div class="profile-stat"><div class="stat-num">${likes}</div><div class="stat-label">Thích</div></div></div>`;
        h += '<div class="profile-actions">';
        if (me) { h += '<button class="btn-edit-profile" onclick="editProfile()">S?a</button>'; } else if (currentUser) {
            if (!(allContacts[currentUser.id]||[]).includes(uid)) h += `<button class="btn-send-request" onclick="sendFriendRequest('${uid}');closeProfile();">G?i l?i m?i</button>`;
            h += `<button class="${fw?'btn-unfollow-action':'btn-follow-action'}" onclick="toggleFollow('${uid}')">${fw?'B? theo dői':'Theo dői'}</button>`;
            h += `<button class="${lk?'btn-unlike-action':'btn-like-action'}" onclick="toggleLike('${uid}')">${lk?'B? thích':'Thích'}</button>`;
        }
        h += '<button class="btn-close-profile" onclick="closeProfile()">Đóng</button></div>';
        document.getElementById('profileCard').innerHTML = h;
        document.getElementById('profileOverlay').classList.add('show');
    }

    window.closeProfile = () => document.getElementById('profileOverlay').classList.remove('show');
    window.toggleFollow = async (uid) => {
        allFollows[currentUser.id] = allFollows[currentUser.id] || [];
        const idx = allFollows[currentUser.id].indexOf(uid);
        if (idx >= 0) allFollows[currentUser.id].splice(idx, 1);
        else allFollows[currentUser.id].push(uid);
        await saveData();
        showProfile(uid);
    };
    window.toggleLike = async (uid) => {
        allLikes[uid] = allLikes[uid] || [];
        const idx = allLikes[uid].indexOf(currentUser.id);
        if (idx >= 0) allLikes[uid].splice(idx, 1);
        else allLikes[uid].push(currentUser.id);
        await saveData();
        showProfile(uid);
    };
    window.editProfile = () => {
        const dn = prompt('Tęn hi?n th?:', currentUser.dn);
        if (dn && dn.trim()) {
            const bio = prompt('Gi?i thi?u:', currentUser.bio || '');
            currentUser.dn = dn.trim();
            currentUser.bio = bio ? bio.trim() : '';
            currentUser.av = currentUser.dn.charAt(0).toUpperCase();
            allUsers[currentUser.un].dn = currentUser.dn;
            allUsers[currentUser.un].bio = currentUser.bio;
            allUsers[currentUser.un].av = currentUser.av;
            saveData();
            showApp();
            showProfile(currentUser.id);
            st('Đă c?p nh?t!', 'success');
        }
    };

    (async () => {
        await loadData();
        if (!allUsers['admin']) {
            allUsers['admin'] = { id: '@admin', un: 'admin', dn: 'Admin', pw: '08112012', av: 'A', isAd: true, bio: 'Admin', ct: Date.now() };
            allContacts['@admin'] = []; allFollows['@admin'] = []; allLikes['@admin'] = [];
            friendRequests['@admin'] = [];
            await saveData();
        }
    })();
</script>
</body>
